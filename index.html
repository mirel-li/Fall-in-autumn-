<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Досье персонажей</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f0ebe3;
  --bg2:       #e8e0d4;
  --sidebar:   #e2d9cc;
  --line:      #c8bfb0;
  --umber:     #8a7260;
  --text:      #3a2e24;
  --dim:       #9a8878;
  --accent:    #5c4434;
  --parchment: #7a5c44;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

.app { display: flex; min-height: 100vh; }

/* ── Sidebar ── */
.sidebar {
  width: 200px;
  min-height: 100vh;
  background: var(--sidebar);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  overflow-y: auto;
  z-index: 100;
}

.sidebar-title {
  padding: 32px 20px 20px;
  border-bottom: 1px solid var(--line);
}

.sidebar-eyebrow {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 6px;
}

.sidebar-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem;
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
  line-height: 1.2;
}

.char-list { list-style: none; padding: 8px 0; flex: 1; }

.char-list li { border-bottom: 1px solid rgba(0,0,0,0.05); }

.char-btn {
  width: 100%;
  background: none;
  border: none;
  padding: 9px 20px;
  text-align: left;
  cursor: pointer;
  color: var(--dim);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.88rem;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.15s, color 0.15s;
  font-weight: 300;
}

.char-btn:hover { background: rgba(0,0,0,0.04); color: var(--text); }
.char-btn.active { color: var(--accent); background: rgba(0,0,0,0.06); }

.char-btn .num {
  font-size: 0.62rem;
  color: var(--line);
  min-width: 18px;
  letter-spacing: 0.05em;
}

.char-btn .cname {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-style: italic;
}

.char-btn .dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--umber);
  flex-shrink: 0;
  opacity: 0;
  margin-left: auto;
}

.char-btn.has-data .dot { opacity: 1; }

/* ── Main ── */
.main {
  margin-left: 200px;
  flex: 1;
  padding: 56px 72px 100px;
  max-width: 860px;
  animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Page header ── */
.page-header {
  margin-bottom: 52px;
}

.page-eyebrow {
  font-size: 0.6rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 10px;
}

.page-title {
  font-family: 'Playfair Display', serif;
  font-size: 2.2rem;
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
  line-height: 1.1;
}

.page-title .star {
  font-style: normal;
  font-size: 1rem;
  opacity: 0.4;
  margin-right: 8px;
}

/* ── Photo section ── */
.photo-section {
  display: flex;
  align-items: flex-start;
  gap: 44px;
  margin-bottom: 56px;
  padding-bottom: 48px;
  border-bottom: 1px solid var(--line);
}

.photo-frame { flex-shrink: 0; width: 160px; }

.photo-label {
  font-size: 0.58rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 8px;
}

.photo-slot {
  width: 160px;
  height: 200px;
  border: 1px solid var(--line);
  background: var(--bg2);
  position: relative;
  cursor: pointer;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.2s;
}

.photo-slot:hover { border-color: var(--umber); }

.photo-slot img { width: 100%; height: 100%; object-fit: cover; }

.photo-placeholder { text-align: center; color: var(--line); pointer-events: none; }

.photo-placeholder svg { opacity: 0.5; }

.photo-placeholder p {
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  margin-top: 8px;
  color: var(--dim);
  text-transform: uppercase;
}

.photo-remove {
  position: absolute;
  top: 6px; right: 6px;
  background: rgba(240,235,227,0.9);
  border: 1px solid var(--line);
  color: var(--dim);
  font-size: 0.6rem;
  padding: 2px 7px;
  cursor: pointer;
  display: none;
  font-family: 'Cormorant Garamond', serif;
  letter-spacing: 0.05em;
}

.photo-slot:hover .photo-remove { display: block; }
.photo-input { display: none; }

/* ── Name fields ── */
.name-fields { flex: 1; }

.name-fields .field-label {
  font-size: 0.58rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 16px;
}

/* ── Sections ── */
.section { margin-bottom: 48px; }

.section-title {
  font-size: 0.58rem;
  font-weight: 400;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--line);
}

/* ── Fields ── */
.fields-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px 40px;
}

.fields-grid.single { grid-template-columns: 1fr; }

.field { display: flex; flex-direction: column; gap: 5px; }
.field.span2 { grid-column: span 2; }

.field-label {
  font-size: 0.58rem;
  letter-spacing: 0.2em;
  color: var(--dim);
  text-transform: uppercase;
}

input[type="text"],
textarea {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--line);
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  font-weight: 300;
  padding: 4px 0;
  width: 100%;
  outline: none;
  transition: border-color 0.2s;
  resize: none;
}

input[type="text"]:focus,
textarea:focus { border-bottom-color: var(--umber); }

input[type="text"]::placeholder,
textarea::placeholder { color: var(--line); font-style: italic; }

textarea { min-height: 60px; line-height: 1.65; }

/* ── Checkboxes ── */
.checkboxes {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 24px;
}

.cb-item {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.95rem;
  font-weight: 300;
  color: var(--dim);
  user-select: none;
  transition: color 0.15s;
}

.cb-item:hover { color: var(--text); }

.cb-item input[type="checkbox"] {
  appearance: none;
  width: 12px; height: 12px;
  border: 1px solid var(--line);
  background: transparent;
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
  transition: border-color 0.15s;
}

.cb-item input[type="checkbox"]:checked {
  border-color: var(--umber);
}

.cb-item input[type="checkbox"]:checked::after {
  content: '×';
  position: absolute;
  top: -3px; left: 1px;
  font-size: 0.7rem;
  color: var(--umber);
}

/* ── Bullet ── */
.bullet-field {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 10px;
}

.bullet-field::before {
  content: '—';
  color: var(--line);
  flex-shrink: 0;
  font-size: 0.8rem;
}

/* ── Divider ── */
.divider {
  text-align: center;
  margin: 36px 0;
  color: var(--line);
  font-size: 0.7rem;
  letter-spacing: 0.5em;
}

/* ── Quote ── */
.quote-wrap {
  padding: 20px 0;
  position: relative;
}

.quote-wrap::before {
  content: '"';
  font-family: 'Playfair Display', serif;
  font-size: 5rem;
  color: var(--line);
  position: absolute;
  top: -10px; left: -16px;
  line-height: 1;
  pointer-events: none;
}

.quote-wrap textarea {
  font-size: 1.1rem;
  font-style: italic;
  text-align: center;
  padding-left: 20px;
  color: var(--accent);
}

/* ── Save bar ── */
.save-bar {
  position: fixed;
  bottom: 0;
  left: 200px; right: 0;
  padding: 14px 72px;
  background: linear-gradient(to top, var(--bg) 70%, transparent);
  display: flex;
  align-items: center;
  gap: 16px;
  z-index: 50;
  flex-wrap: wrap;
}

.btn-save {
  background: none;
  border: 1px solid var(--umber);
  color: var(--accent);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 9px 28px;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-save:hover { background: rgba(0,0,0,0.06); }

.btn-secondary {
  background: none;
  border: none;
  color: var(--dim);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 9px 0;
  transition: color 0.15s;
}

.btn-secondary:hover { color: var(--text); }

.btn-chat {
  background: none;
  border: 1px solid var(--line);
  color: var(--umber);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 9px 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: border-color 0.2s, color 0.2s;
  margin-left: auto;
}

.btn-chat:hover { border-color: var(--umber); color: var(--accent); }

.btn-export {
  background: none;
  border: none;
  color: var(--dim);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 9px 0;
  transition: color 0.15s;
}

.btn-export:hover { color: var(--text); }

.save-status {
  font-size: 0.62rem;
  letter-spacing: 0.15em;
  color: var(--umber);
  text-transform: uppercase;
  opacity: 0;
  transition: opacity 0.4s;
}

.save-status.show { opacity: 1; }

.autosave-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--umber);
  opacity: 0;
}

@keyframes pulse {
  0%   { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.8); }
}

.autosave-dot.pulse { animation: pulse 1s ease-out forwards; }

/* ── Chat panel ── */
.chat-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(58,46,36,0.25);
  backdrop-filter: blur(2px);
}

.chat-overlay.open { display: flex; align-items: flex-end; justify-content: flex-end; }

.chat-panel {
  width: 420px;
  height: 100vh;
  background: var(--bg);
  border-left: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  animation: slideIn 0.25s ease;
}

@keyframes slideIn {
  from { transform: translateX(40px); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}

.chat-header {
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-shrink: 0;
}

.chat-header-text {}

.chat-title {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-style: italic;
  color: var(--accent);
  margin-bottom: 4px;
}

.chat-subtitle {
  font-size: 0.62rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--dim);
}

.chat-close {
  background: none;
  border: none;
  color: var(--dim);
  font-size: 1.1rem;
  cursor: pointer;
  padding: 0;
  line-height: 1;
  transition: color 0.15s;
}

.chat-close:hover { color: var(--text); }

.chat-context {
  padding: 12px 28px;
  border-bottom: 1px solid var(--line);
  font-size: 0.65rem;
  color: var(--dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  flex-shrink: 0;
}

.chat-context span { color: var(--accent); font-style: italic; font-size: 0.75rem; letter-spacing: 0; text-transform: none; }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 28px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.chat-msg {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-width: 90%;
}

.chat-msg.user { align-self: flex-end; align-items: flex-end; }
.chat-msg.ai   { align-self: flex-start; }

.chat-msg-label {
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--dim);
}

.chat-msg-bubble {
  font-size: 0.92rem;
  line-height: 1.65;
  color: var(--text);
  padding: 10px 14px;
  border: 1px solid var(--line);
  background: var(--bg2);
}

.chat-msg.user .chat-msg-bubble {
  background: var(--sidebar);
  border-color: var(--line);
}

.chat-msg.ai .chat-msg-bubble {
  background: var(--bg);
}

.chat-empty {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
}

.chat-empty p {
  font-size: 0.8rem;
  color: var(--dim);
  font-style: italic;
  line-height: 1.7;
}

.chat-suggestions {
  padding: 0 28px 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  flex-shrink: 0;
}

.chat-suggestion {
  background: none;
  border: 1px solid var(--line);
  color: var(--dim);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.78rem;
  padding: 5px 12px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  font-style: italic;
}

.chat-suggestion:hover { border-color: var(--umber); color: var(--text); }

.chat-input-row {
  padding: 16px 28px 20px;
  border-top: 1px solid var(--line);
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
}

.chat-input {
  flex: 1;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--line);
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.95rem;
  padding: 6px 0;
  outline: none;
  resize: none;
  min-height: 32px;
  max-height: 100px;
  line-height: 1.5;
  transition: border-color 0.2s;
}

.chat-input:focus { border-bottom-color: var(--umber); }
.chat-input::placeholder { color: var(--line); font-style: italic; }

.btn-send {
  background: none;
  border: 1px solid var(--umber);
  color: var(--accent);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 7px 16px;
  cursor: pointer;
  transition: background 0.15s;
  flex-shrink: 0;
  align-self: flex-end;
}

.btn-send:hover { background: rgba(0,0,0,0.04); }
.btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Export modal ── */
.export-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 300;
  background: rgba(58,46,36,0.3);
  backdrop-filter: blur(2px);
  align-items: center;
  justify-content: center;
}

.export-overlay.open { display: flex; }

.export-modal {
  background: var(--bg);
  border: 1px solid var(--line);
  width: 560px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  animation: fadeIn 0.2s ease;
}

.export-modal-header {
  padding: 24px 28px 16px;
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.export-modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-style: italic;
  color: var(--accent);
}

.export-modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 28px;
}

.export-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.88rem;
  line-height: 1.75;
  color: var(--text);
  white-space: pre-wrap;
  background: var(--bg2);
  border: 1px solid var(--line);
  padding: 16px;
  user-select: all;
}

.export-modal-footer {
  padding: 16px 28px;
  border-top: 1px solid var(--line);
  display: flex;
  gap: 12px;
  flex-shrink: 0;
}

@media (max-width: 768px) {
  .sidebar { width: 160px; }
  .main { margin-left: 160px; padding: 32px 24px 100px; }
  .fields-grid { grid-template-columns: 1fr; }
  .field.span2 { grid-column: span 1; }
  .save-bar { left: 160px; padding: 14px 24px; }
  .photo-section { flex-direction: column; }
  .chat-panel { width: 100vw; }
  .export-modal { width: 95vw; }
}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-title">
      <div class="sidebar-eyebrow">Архив</div>
      <div class="sidebar-name">Персонажи</div>
    </div>
    <ul class="char-list" id="charList"></ul>
  </aside>

  <main class="main" id="mainContent"></main>
</div>

<div class="save-bar">
  <button class="btn-save" onclick="saveCurrentChar()">Сохранить</button>
  <button class="btn-secondary" onclick="clearCurrentChar()">Очистить</button>
  <div class="autosave-dot" id="autosaveDot"></div>
  <div class="save-status" id="saveStatus">Сохранено</div>
  <button class="btn-export" onclick="openExport()">Экспорт текста</button>
  <button class="btn-chat" onclick="openInClaude()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Открыть в Claude
  </button>
</div>

<!-- Export Modal -->
<div class="export-overlay" id="exportOverlay" onclick="closeExportIfBg(event)">
  <div class="export-modal">
    <div class="export-modal-header">
      <div class="export-modal-title">Экспорт досье</div>
      <button class="chat-close" onclick="closeExport()">✕</button>
    </div>
    <div class="export-modal-body">
      <div class="export-text" id="exportText"></div>
    </div>
    <div class="export-modal-footer">
      <button class="btn-save" onclick="copyExport()">Скопировать</button>
      <div class="save-status" id="copyStatus" style="position:static;">Скопировано</div>
    </div>
  </div>
</div>

<!-- Chat panel removed - use Export + Open in Claude instead -->

<script>
const TOTAL = 20;
let currentChar = 0;
let data = {};
let autoSaveTimer = null;

function loadAll() {
  for (let i = 0; i < TOTAL; i++) {
    const raw = localStorage.getItem(`evermore_char_${i}`);
    data[i] = raw ? JSON.parse(raw) : {};
  }
}

function saveChar(idx) {
  localStorage.setItem(`evermore_char_${idx}`, JSON.stringify(data[idx] || {}));
}

function getField(field) {
  return (data[currentChar] || {})[field] || '';
}

function setField(field, value) {
  if (!data[currentChar]) data[currentChar] = {};
  data[currentChar][field] = value;
  scheduleAutosave();
  updateSidebarItem(currentChar);
}

function scheduleAutosave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    saveChar(currentChar);
    const dot = document.getElementById('autosaveDot');
    dot.classList.remove('pulse');
    void dot.offsetWidth;
    dot.classList.add('pulse');
  }, 1200);
}

function saveCurrentChar() {
  saveChar(currentChar);
  const s = document.getElementById('saveStatus');
  s.classList.add('show');
  setTimeout(() => s.classList.remove('show'), 2000);
  updateSidebarItem(currentChar);
}

function clearCurrentChar() {
  if (!confirm('Очистить все поля этого персонажа?')) return;
  data[currentChar] = {};
  saveChar(currentChar);
  renderPage(currentChar);
  updateSidebarItem(currentChar);
}

function hasData(idx) {
  return Object.values(data[idx] || {}).some(v => v && v !== '');
}

function getCharName(idx) {
  const d = data[idx] || {};
  return [d.first_name, d.last_name].filter(Boolean).join(' ') || `Персонаж ${idx + 1}`;
}

function updateSidebarItem(idx) {
  const btn = document.querySelector(`#charList li:nth-child(${idx+1}) .char-btn`);
  if (!btn) return;
  btn.querySelector('.cname').textContent = getCharName(idx);
  btn.classList.toggle('has-data', hasData(idx));
}

function buildSidebar() {
  const list = document.getElementById('charList');
  list.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const li = document.createElement('li');
    const btn = document.createElement('button');
    btn.className = 'char-btn' + (i === currentChar ? ' active' : '') + (hasData(i) ? ' has-data' : '');
    btn.innerHTML = `<span class="num">${String(i+1).padStart(2,'0')}</span><span class="cname">${getCharName(i)}</span><span class="dot"></span>`;
    btn.onclick = () => switchChar(i);
    li.appendChild(btn);
    list.appendChild(li);
  }
}

function switchChar(idx) {
  saveChar(currentChar);
  currentChar = idx;
  buildSidebar();
  renderPage(idx);
  window.scrollTo(0, 0);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function inp(field, placeholder = '') {
  return `<input type="text" data-field="${field}" placeholder="${placeholder}" value="${esc(getField(field))}">`;
}

function ta(field, placeholder = '') {
  return `<textarea data-field="${field}" placeholder="${placeholder}" rows="3">${esc(getField(field))}</textarea>`;
}

function cb(field, label) {
  const ch = getField(field) === '1' ? 'checked' : '';
  return `<label class="cb-item"><input type="checkbox" data-field="${field}" ${ch}> ${label}</label>`;
}

function f(label, field, multi = false, span2 = false, ph = '') {
  return `<div class="field${span2?' span2':''}">
    <div class="field-label">${label}</div>
    ${multi ? ta(field, ph) : inp(field, ph)}
  </div>`;
}

function bindEvents() {
  document.querySelectorAll('input[type="text"][data-field], textarea[data-field]').forEach(el => {
    el.addEventListener('input', () => setField(el.dataset.field, el.value));
  });
  document.querySelectorAll('input[type="checkbox"][data-field]').forEach(el => {
    el.addEventListener('change', () => setField(el.dataset.field, el.checked ? '1' : '0'));
  });
}

function triggerPhoto() { document.getElementById('photoInput').click(); }

function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    setField('photo', ev.target.result);
    saveChar(currentChar);
    renderPage(currentChar);
  };
  reader.readAsDataURL(file);
}

function removePhoto(e) {
  e.stopPropagation();
  setField('photo', '');
  saveChar(currentChar);
  renderPage(currentChar);
}

loadAll();

renderPage(0);

function openExport() {
  const text = buildExportText(currentChar);
  document.getElementById('exportText').textContent = text;
  document.getElementById('exportOverlay').classList.add('open');
}

function closeExport() {
  document.getElementById('exportOverlay').classList.remove('open');
}

function closeExportIfBg(e) {
  if (e.target === document.getElementById('exportOverlay')) closeExport();
}

function copyExport() {
  const text = document.getElementById('exportText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const s = document.getElementById('copyStatus');
    s.classList.add('show');
    setTimeout(() => s.classList.remove('show'), 2000);
  });
}

// ── Open in Claude ──
function openInClaude() {
  const text = buildExportText(currentChar);
  const prompt = `Вот досье моего персонажа. Прочитай его и жди моих вопросов — я хочу обсудить этого персонажа с тобой.\n\n${text}`;
  navigator.clipboard.writeText(prompt).then(() => {
    const s = document.getElementById('saveStatus');
    s.textContent = 'Скопировано → вставь в чат';
    s.classList.add('show');
    setTimeout(() => {
      s.textContent = 'Сохранено';
      s.classList.remove('show');
    }, 3000);
    window.open('https://claude.ai', '_blank');
  }).catch(() => {
    window.open('https://claude.ai', '_blank');
  });
}
